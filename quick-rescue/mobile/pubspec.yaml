name: quick_rescue
description: App móvil de Quick Rescue. Mapa, GPS y botón SOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1                       # Cliente HTTP simple
  shared_preferences: ^2.2.3         # Persistencia local del token
  geolocator: ^11.0.0                # GPS con permisos
  google_maps_flutter: ^2.6.1        # Mapa con Google Maps SDK
  url_launcher: ^6.2.6               # Abrir tel:, mailto:, https://

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
