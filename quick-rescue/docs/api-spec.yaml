openapi: 3.0.3
info:
  title: Quick Rescue API
  description: |
    API REST del sistema Quick Rescue. Autenticación con JWT (Bearer token).
    Todos los endpoints (excepto `/auth/*` y `/health`) requieren header
    `Authorization: Bearer <token>`.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Desarrollo local
  - url: https://api.quickrescue.pe/api/v1
    description: Producción

tags:
  - name: Auth
    description: Registro, login y manejo de sesión
  - name: Usuarios
    description: Perfil del usuario autenticado
  - name: Familiares
    description: Contactos de emergencia del usuario
  - name: HistorialMedico
    description: Información médica del usuario
  - name: Ubicaciones
    description: Histórico de geolocalización
  - name: SOS
    description: Botón de emergencia

paths:
  /health:
    get:
      summary: Estado del servicio
      tags: [Auth]
      security: []
      responses:
        '200':
          description: OK

  # ----------- AUTH -----------
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de un nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, apellido, email, password]
              properties:
                nombre:    { type: string, example: "María" }
                apellido:  { type: string, example: "Pérez Soto" }
                email:     { type: string, format: email }
                password:  { type: string, format: password, minLength: 8 }
                dni:       { type: string, example: "12345678" }
                fecha_nacimiento:
                  { type: string, format: date, example: "1948-03-15" }
                direccion: { type: string }
                distrito:  { type: string }
                provincia: { type: string }
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409': { description: Email ya registrado }
        '422': { description: Validación fallida }

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Token emitido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { description: Credenciales incorrectas }

  /auth/me:
    get:
      tags: [Auth]
      summary: Datos del usuario autenticado
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Usuario' }

  # ----------- USUARIOS -----------
  /usuarios/me:
    get:
      tags: [Usuarios]
      summary: Obtener mi perfil completo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Usuario' }
    put:
      tags: [Usuarios]
      summary: Actualizar mi perfil
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UsuarioUpdate' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Usuarios]
      summary: Eliminar mi cuenta
      responses:
        '200': { description: OK }

  # ----------- FAMILIARES -----------
  /familiares:
    get:
      tags: [Familiares]
      summary: Listar mis familiares
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Familiar' }
    post:
      tags: [Familiares]
      summary: Agregar un familiar
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FamiliarInput' }
      responses:
        '201': { description: Creado }

  /familiares/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      tags: [Familiares]
      summary: Actualizar familiar
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FamiliarInput' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Familiares]
      summary: Eliminar familiar
      responses:
        '200': { description: OK }

  # ----------- HISTORIAL MEDICO -----------
  /historial-medico:
    get:
      tags: [HistorialMedico]
      summary: Obtener mi historial médico
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/HistorialMedico' }
    put:
      tags: [HistorialMedico]
      summary: Actualizar mi historial médico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alergias:    { type: string }
                enfermedades:{ type: string }
                operaciones: { type: string }
                medicamentos:{ type: string }
                grupo_sanguineo: { type: string }
      responses:
        '200': { description: OK }

  # ----------- UBICACIONES -----------
  /ubicaciones:
    get:
      tags: [Ubicaciones]
      summary: Listar mis últimas ubicaciones
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Ubicacion' }
    post:
      tags: [Ubicaciones]
      summary: Reportar mi ubicación actual (desde la app móvil)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitud, longitud]
              properties:
                latitud:  { type: number, format: float, example: -11.8914677 }
                longitud: { type: number, format: float, example: -77.1272968 }
                precision_m: { type: integer, example: 15 }
      responses:
        '201': { description: Creado }

  # ----------- SOS -----------
  /sos:
    post:
      tags: [SOS]
      summary: Disparar alerta SOS (envía email a todos los familiares)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitud, longitud]
              properties:
                latitud:  { type: number, format: float }
                longitud: { type: number, format: float }
                mensaje:  { type: string }
      responses:
        '200':
          description: SOS enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      familiares_notificados: { type: integer }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            usuario: { $ref: '#/components/schemas/Usuario' }
            token:   { type: string }

    Usuario:
      type: object
      properties:
        id:        { type: integer, example: 1 }
        nombre:    { type: string }
        apellido:  { type: string }
        dni:       { type: string }
        email:     { type: string, format: email }
        foto:      { type: string, nullable: true }
        fecha_nacimiento: { type: string, format: date, nullable: true }
        direccion: { type: string, nullable: true }
        distrito:  { type: string, nullable: true }
        provincia: { type: string, nullable: true }
        creado_en: { type: string, format: date-time }

    UsuarioUpdate:
      type: object
      properties:
        nombre:    { type: string }
        apellido:  { type: string }
        dni:       { type: string }
        foto:      { type: string }
        fecha_nacimiento: { type: string, format: date }
        direccion: { type: string }
        distrito:  { type: string }
        provincia: { type: string }

    Familiar:
      type: object
      properties:
        id:        { type: integer }
        usuario_id:{ type: integer }
        nombre:    { type: string }
        telefono:  { type: string }
        email:     { type: string, format: email, nullable: true }
        relacion:  { type: string, example: "Hijo" }

    FamiliarInput:
      type: object
      required: [nombre, telefono, relacion]
      properties:
        nombre:   { type: string }
        telefono: { type: string }
        email:    { type: string, format: email }
        relacion: { type: string }

    HistorialMedico:
      type: object
      properties:
        id:           { type: integer }
        usuario_id:   { type: integer }
        alergias:     { type: string, nullable: true }
        enfermedades: { type: string, nullable: true }
        operaciones:  { type: string, nullable: true }
        medicamentos: { type: string, nullable: true }
        grupo_sanguineo: { type: string, nullable: true }
        actualizado_en:  { type: string, format: date-time }

    Ubicacion:
      type: object
      properties:
        id:        { type: integer }
        usuario_id:{ type: integer }
        latitud:   { type: number, format: float }
        longitud:  { type: number, format: float }
        precision_m: { type: integer, nullable: true }
        es_sos:    { type: boolean }
        timestamp: { type: string, format: date-time }

security:
  - bearerAuth: []
