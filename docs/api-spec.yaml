openapi: 3.0.3
info:
  title: Quick Rescue API
  description: |
    API REST del sistema Quick Rescue. Autenticación con JWT (Bearer token).
    Todos los endpoints (excepto `/auth/*` y `/health`) requieren header
    `Authorization: Bearer <token>`.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Desarrollo local
  - url: https://api.quickrescue.pe/api/v1
    description: Producción

tags:
  - name: Auth
    description: Registro, login y manejo de sesión
  - name: Usuarios
    description: Perfil del usuario autenticado
  - name: Familiares
    description: Contactos de emergencia del usuario
  - name: Mascotas
    description: Mascotas del usuario (incluye marcado de "perdida")
  - name: HistorialMedico
    description: Información médica del usuario
  - name: Ubicaciones
    description: Histórico de geolocalización del titular
  - name: QR
    description: Endpoints PÚBLICOS (sin auth) consumidos por la página
                 pública del QR físico
  - name: Escaneos
    description: Histórico de escaneos recibidos por el titular
  - name: Fotos
    description: Subida de fotos a Cloudinary
  - name: Tienda
    description: Catálogo público de productos (collar/pulsera/llavero)
  - name: Compras
    description: Pedidos del titular sobre los productos de la tienda

paths:
  /health:
    get:
      summary: Estado del servicio
      tags: [Auth]
      security: []
      responses:
        '200':
          description: OK

  # ----------- AUTH -----------
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de un nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, apellido, email, password]
              properties:
                nombre:    { type: string, example: "María" }
                apellido:  { type: string, example: "Pérez Soto" }
                email:     { type: string, format: email }
                password:  { type: string, format: password, minLength: 8 }
                dni:       { type: string, example: "12345678" }
                fecha_nacimiento:
                  { type: string, format: date, example: "1948-03-15" }
                direccion: { type: string }
                distrito:  { type: string }
                provincia: { type: string }
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409': { description: Email ya registrado }
        '422': { description: Validación fallida }

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Token emitido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { description: Credenciales incorrectas }

  /auth/me:
    get:
      tags: [Auth]
      summary: Datos del usuario autenticado
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Usuario' }

  # ----------- USUARIOS -----------
  /usuarios/me:
    get:
      tags: [Usuarios]
      summary: Obtener mi perfil completo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Usuario' }
    put:
      tags: [Usuarios]
      summary: Actualizar mi perfil
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UsuarioUpdate' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Usuarios]
      summary: Eliminar mi cuenta
      responses:
        '200': { description: OK }

  # ----------- QR PÚBLICO (sin autenticación) -----------
  /qr/{tipo}/{id}/publico:
    get:
      tags: [QR]
      summary: Datos públicos asociados a un QR físico
      description: |
        Endpoint que consume el frontend público cuando un transeúnte abre
        la URL del QR desde la cámara nativa de su celular.
        Devuelve foto, nombre, datos médicos relevantes y datos de contacto
        del titular. NO incluye email, dni ni password.
      security: []
      parameters:
        - in: path
          name: tipo
          required: true
          schema: { type: string, enum: [usuario, familiar, mascota] }
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/PerfilPublico' }
        '404': { description: QR no válido }

  /qr/{tipo}/{id}/escaneo:
    post:
      tags: [QR]
      summary: Registrar un escaneo del QR físico
      description: |
        El transeúnte (o la app móvil del titular) registra que escaneó el
        QR. Si comparte permiso de geolocalización del navegador se envían
        las coordenadas; si no, se registra el escaneo sin ubicación.
        Dispara un email automático al titular notificando el escaneo.
      security: []
      parameters:
        - in: path
          name: tipo
          required: true
          schema: { type: string, enum: [usuario, familiar, mascota] }
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitud:  { type: number, format: float, nullable: true }
                longitud: { type: number, format: float, nullable: true }
      responses:
        '201':
          description: Escaneo registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      escaneo_id: { type: integer }
                      notificado: { type: boolean }

  # ----------- ESCANEOS (titular autenticado) -----------
  /escaneos:
    get:
      tags: [Escaneos]
      summary: Histórico de escaneos del titular
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Escaneo' }

  # ----------- FAMILIARES -----------
  /familiares:
    get:
      tags: [Familiares]
      summary: Listar mis familiares
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Familiar' }
    post:
      tags: [Familiares]
      summary: Agregar un familiar
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FamiliarInput' }
      responses:
        '201': { description: Creado }

  /familiares/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      tags: [Familiares]
      summary: Actualizar familiar
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FamiliarInput' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Familiares]
      summary: Eliminar familiar
      responses:
        '200': { description: OK }

  # ----------- MASCOTAS -----------
  /mascotas:
    get:
      tags: [Mascotas]
      summary: Listar mis mascotas
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Mascota' }
    post:
      tags: [Mascotas]
      summary: Agregar una mascota
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MascotaInput' }
      responses:
        '201': { description: Creada }

  /mascotas/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      tags: [Mascotas]
      summary: Actualizar mascota
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MascotaInput' }
      responses:
        '200': { description: OK }
    delete:
      tags: [Mascotas]
      summary: Eliminar mascota
      responses:
        '200': { description: OK }

  # ----------- HISTORIAL MEDICO -----------
  /historial-medico:
    get:
      tags: [HistorialMedico]
      summary: Obtener mi historial médico
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/HistorialMedico' }
    put:
      tags: [HistorialMedico]
      summary: Actualizar mi historial médico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alergias:    { type: string }
                enfermedades:{ type: string }
                operaciones: { type: string }
                medicamentos:{ type: string }
                grupo_sanguineo: { type: string }
      responses:
        '200': { description: OK }

  # ----------- UBICACIONES -----------
  /ubicaciones:
    get:
      tags: [Ubicaciones]
      summary: Listar mis últimas ubicaciones
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Ubicacion' }
    post:
      tags: [Ubicaciones]
      summary: Reportar mi ubicación actual (desde la app móvil)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitud, longitud]
              properties:
                latitud:  { type: number, format: float, example: -11.8914677 }
                longitud: { type: number, format: float, example: -77.1272968 }
                precision_m: { type: integer, example: 15 }
      responses:
        '201': { description: Creado }

  # ----------- FOTOS (multipart/form-data) -----------
  /fotos/usuario/me:
    post:
      tags: [Fotos]
      summary: Subir/reemplazar foto del titular
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [foto]
              properties:
                foto: { type: string, format: binary }
      responses:
        '201':
          description: URL Cloudinary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties: { url: { type: string, format: uri } }

  /fotos/familiar/{id}:
    post:
      tags: [Fotos]
      summary: Subir foto de un familiar (verifica ownership)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [foto]
              properties: { foto: { type: string, format: binary } }
      responses:
        '201': { description: OK }

  /fotos/mascota/{id}:
    post:
      tags: [Fotos]
      summary: Subir foto de una mascota (verifica ownership)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [foto]
              properties: { foto: { type: string, format: binary } }
      responses:
        '201': { description: OK }

  # ----------- TIENDA (catálogo público) -----------
  /tienda/productos:
    get:
      tags: [Tienda]
      summary: Catálogo de productos QR físicos
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Producto' }

  # ----------- COMPRAS (titular autenticado) -----------
  /compras:
    get:
      tags: [Compras]
      summary: Historial de mis compras
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Compra' }
    post:
      tags: [Compras]
      summary: Crear nuevo pedido
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompraInput' }
      responses:
        '201':
          description: Pedido creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Compra' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            usuario: { $ref: '#/components/schemas/Usuario' }
            token:   { type: string }

    Usuario:
      type: object
      properties:
        id:        { type: integer, example: 1 }
        nombre:    { type: string }
        apellido:  { type: string }
        dni:       { type: string }
        email:     { type: string, format: email }
        foto:      { type: string, nullable: true }
        fecha_nacimiento: { type: string, format: date, nullable: true }
        direccion: { type: string, nullable: true }
        distrito:  { type: string, nullable: true }
        provincia: { type: string, nullable: true }
        creado_en: { type: string, format: date-time }

    PerfilPublico:
      type: object
      properties:
        tipo:            { type: string, enum: [usuario, familiar, mascota] }
        id:              { type: integer }
        titular_id:      { type: integer }
        nombre:          { type: string }
        subtitulo:       { type: string, example: "Hijo" }
        foto:            { type: string, nullable: true }
        grupo_sanguineo: { type: string, nullable: true }
        alergias:        { type: string, nullable: true }
        enfermedades:    { type: string, nullable: true }
        medicamentos:    { type: string, nullable: true }
        microchip:       { type: string, nullable: true,  description: "Solo mascotas" }
        perdida:         { type: boolean, description: "Solo mascotas" }
        mensaje_perdida: { type: string,  nullable: true, description: "Solo mascotas" }
        contacto:
          type: object
          properties:
            nombre_titular: { type: string }
            telefono:       { type: string, nullable: true }
            relacion:       { type: string, nullable: true }
            familiares:
              type: array
              items:
                type: object
                properties:
                  nombre:   { type: string }
                  telefono: { type: string }
                  relacion: { type: string }

    Escaneo:
      type: object
      properties:
        id:                { type: integer }
        tipo:              { type: string, enum: [usuario, familiar, mascota] }
        referencia_id:     { type: integer }
        nombre_referencia: { type: string }
        latitud:           { type: number, format: float, nullable: true }
        longitud:          { type: number, format: float, nullable: true }
        direccion:         { type: string, nullable: true }
        creado_en:         { type: string, format: date-time }

    Producto:
      type: object
      properties:
        id:          { type: string, enum: [collar, pulsera, llavero] }
        nombre:      { type: string }
        precio:      { type: number, format: float }
        descripcion: { type: string }

    Compra:
      type: object
      properties:
        id:                  { type: integer }
        producto:            { type: string, enum: [collar, pulsera, llavero] }
        producto_nombre:     { type: string }
        destinatario_tipo:   { type: string, enum: [usuario, familiar, mascota] }
        destinatario_id:     { type: integer }
        destinatario_nombre: { type: string }
        precio:              { type: number, format: float }
        estado:              { type: string, enum: [pendiente, confirmado, enviado, entregado, cancelado] }
        notas:               { type: string, nullable: true }
        creado_en:           { type: string, format: date-time }

    CompraInput:
      type: object
      required: [producto, destinatario_tipo, destinatario_id]
      properties:
        producto:          { type: string, enum: [collar, pulsera, llavero] }
        destinatario_tipo: { type: string, enum: [usuario, familiar, mascota] }
        destinatario_id:   { type: integer }
        notas:             { type: string }

    UsuarioUpdate:
      type: object
      properties:
        nombre:    { type: string }
        apellido:  { type: string }
        dni:       { type: string }
        foto:      { type: string }
        fecha_nacimiento: { type: string, format: date }
        direccion: { type: string }
        distrito:  { type: string }
        provincia: { type: string }

    Familiar:
      type: object
      properties:
        id:        { type: integer }
        usuario_id:{ type: integer }
        nombre:    { type: string }
        telefono:  { type: string }
        email:     { type: string, format: email, nullable: true }
        relacion:  { type: string, example: "Hijo" }

    FamiliarInput:
      type: object
      required: [nombre, telefono, relacion]
      properties:
        nombre:   { type: string }
        telefono: { type: string }
        email:    { type: string, format: email }
        relacion: { type: string }

    Mascota:
      type: object
      properties:
        id:              { type: integer }
        usuario_id:      { type: integer }
        nombre:          { type: string,  example: "Firulais" }
        especie:         { type: string,  enum: [perro, gato, otro] }
        raza:            { type: string,  nullable: true }
        color:           { type: string,  nullable: true }
        edad_anios:      { type: integer, nullable: true }
        foto:            { type: string,  nullable: true }
        microchip:       { type: string,  nullable: true }
        perdida:         { type: boolean, default: false }
        mensaje_perdida: { type: string,  nullable: true }
        creado_en:       { type: string,  format: date-time }
        actualizado_en:  { type: string,  format: date-time }

    MascotaInput:
      type: object
      required: [nombre, especie]
      properties:
        nombre:          { type: string }
        especie:         { type: string, enum: [perro, gato, otro] }
        raza:            { type: string }
        color:           { type: string }
        edad_anios:      { type: integer }
        foto:            { type: string }
        microchip:       { type: string }
        perdida:         { type: boolean }
        mensaje_perdida: { type: string }

    HistorialMedico:
      type: object
      properties:
        id:           { type: integer }
        usuario_id:   { type: integer }
        alergias:     { type: string, nullable: true }
        enfermedades: { type: string, nullable: true }
        operaciones:  { type: string, nullable: true }
        medicamentos: { type: string, nullable: true }
        grupo_sanguineo: { type: string, nullable: true }
        actualizado_en:  { type: string, format: date-time }

    Ubicacion:
      type: object
      properties:
        id:        { type: integer }
        usuario_id:{ type: integer }
        latitud:   { type: number, format: float }
        longitud:  { type: number, format: float }
        precision_m: { type: integer, nullable: true }
        es_sos:    { type: boolean }
        timestamp: { type: string, format: date-time }

security:
  - bearerAuth: []
