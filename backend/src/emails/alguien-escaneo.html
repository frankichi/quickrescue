<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Alguien escaneó el QR de {{NOMBRE}}</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F8F9FA;margin:0;padding:20px;color:#2C3E50;">
  <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:10px;overflow:hidden;border:1px solid #e3e9ef;">
    <div style="background:#5BA0D0;color:#ffffff;padding:24px;text-align:center;">
      <h1 style="margin:0;font-size:22px;">🔔 Alguien encontró a {{NOMBRE}}</h1>
    </div>

    <div style="padding:24px;">
      {{FOTO_BLOQUE}}

      <p style="font-size:16px;line-height:1.5;margin:16px 0;">
        El código QR de {{TIPO_LABEL}} <strong>{{NOMBRE}}</strong> fue escaneado.
        Puede ser que alguien lo encontró y necesite contactarte.
      </p>

      <p><strong>📅 Fecha:</strong> {{FECHA}}</p>

      {{UBICACION_BLOQUE}}

      <hr style="border:none;border-top:1px solid #e3e9ef;margin:24px 0;">

      <p style="text-align:center;margin:16px 0;">
        <a href="{{APP_URL}}/escaneos" target="_blank"
           style="display:inline-block;background:#2C3E50;color:#ffffff;padding:12px 22px;text-decoration:none;border-radius:6px;font-weight:bold;">
          Abrir Quick Rescue
        </a>
      </p>

      <p style="font-size:12px;color:#7F8C8D;margin:0;text-align:center;">
        Quick Rescue · Identificación por QR físico
      </p>
    </div>
  </div>
</body>
</html>
