name: Build & Release Android APK

# Se dispara al hacer push de un tag tipo "v1.0.0"
# Crea: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:    # También permite ejecución manual desde la UI de GitHub

jobs:
  build-apk:
    name: Compilar APK de release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerar scaffold Android (build.gradle, MainActivity, etc.)
        # El repo solo trackea AndroidManifest.xml personalizado; el resto
        # del scaffold Android lo regenera Flutter aquí. `--platforms android`
        # evita tocar iOS y otras plataformas. No sobrescribe AndroidManifest.
        working-directory: mobile
        run: flutter create --platforms=android --org com.quickrescue .

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build APK release con URLs inyectadas
        # --dart-define inyecta valores en compile-time vía
        # String.fromEnvironment(...) en lib/config/app_config.dart
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${{ secrets.API_BASE_URL }}" \
            --dart-define=PUBLIC_WEB_BASE="${{ secrets.PUBLIC_WEB_BASE }}"

      - name: Renombrar APK
        working-directory: mobile/build/app/outputs/flutter-apk
        run: |
          mv app-release.apk quick-rescue-${{ github.ref_name }}.apk
          # También una copia con nombre estable para URL "latest"
          cp quick-rescue-${{ github.ref_name }}.apk quick-rescue.apk

      - name: Crear GitHub Release y subir APK
        uses: softprops/action-gh-release@v2
        with:
          name: Quick Rescue ${{ github.ref_name }}
          body: |
            ### Quick Rescue ${{ github.ref_name }}

            **Descarga e instalación:**
            1. Descarga `quick-rescue.apk` de abajo.
            2. En tu Android: Configuración → Seguridad → Permitir instalación de apps de orígenes desconocidos.
            3. Abre el archivo descargado para instalar.

            **URL directa (siempre apunta a la última versión):**
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/quick-rescue.apk
            ```
          files: |
            mobile/build/app/outputs/flutter-apk/quick-rescue-${{ github.ref_name }}.apk
            mobile/build/app/outputs/flutter-apk/quick-rescue.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
